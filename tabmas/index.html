<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Emas Kita</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #fdfbf7 50%, #f9f6ea 100%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.05);
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.08), inset 0 1px rgba(255, 255, 255, 1);
        }

        .gold-premium-card {
            background: linear-gradient(135deg, #E6C27A 0%, #FCEABB 45%, #D4AF37 100%);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .text-gold { color: #d4af37; }
    </style>
</head>

<body>

    <div class="max-w-md mx-auto px-5 py-8">

        <div class="mb-8 flex justify-between items-center">
            <span class="inline-flex items-center px-4 py-2 rounded-full glass text-sm font-semibold text-gold">
                ✨ Smart Gold Saving
            </span>
            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
                <i class="fa-regular fa-bell text-gray-500"></i>
            </div>
        </div>

        <div class="gold-premium-card rounded-[35px] px-6 pt-6 pb-8 mb-8 relative overflow-hidden">
            
            <div class="absolute -right-12 -top-12 w-32 h-32 bg-white opacity-40 rounded-full blur-md"></div>
            <div class="absolute -left-8 -bottom-8 w-24 h-24 bg-[#8B6508] opacity-10 rounded-full blur-md"></div>

            <p class="text-[#5C4308] text-sm font-semibold relative z-10 uppercase tracking-wider">
                Total Nilai Tabungan
            </p>

            <h2 id="balance-idr" class="text-4xl font-bold text-gray-900 mt-2 relative z-10 drop-shadow-sm">
                Loading...
            </h2>

            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/40 backdrop-blur-sm border border-white/60 mt-4 text-xs font-bold text-[#5C4308] relative z-10 shadow-sm">
                🪙 Tabungan Emas Digital
            </div>

            <div class="flex justify-between items-center mt-8 relative z-10 px-1">
                
                <button onclick="openModal()" class="flex flex-col items-center gap-2 group">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white transition-transform group-hover:scale-105 shadow-lg">
                        <i class="fa-solid fa-arrow-trend-up text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Beli</span>
                </button>

                <button onclick="alert('Fitur Jual Emas segera hadir!')" class="flex flex-col items-center gap-2 group">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white transition-transform group-hover:scale-105 shadow-lg">
                        <i class="fa-solid fa-hand-holding-dollar text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Jual</span>
                </button>

                <button onclick="alert('Fitur Riwayat segera hadir!')" class="flex flex-col items-center gap-2 group">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white transition-transform group-hover:scale-105 shadow-lg">
                        <i class="fa-solid fa-receipt text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Riwayat</span>
                </button>

                <button onclick="alert('Fitur Target segera hadir!')" class="flex flex-col items-center gap-2 group">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white transition-transform group-hover:scale-105 shadow-lg">
                        <i class="fa-solid fa-bullseye text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Target</span>
                </button>

            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-semibold text-gray-800 text-lg">Anggota</h3>
            <span class="glass px-3 py-1 rounded-full text-xs font-medium text-gray-500">Live Data</span>
        </div>

        <div id="user-list" class="space-y-3"></div>

    </div>

    <div id="modalTambah" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:pb-0 transition-all">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[30px] p-8 shadow-2xl relative animate-fade-in-up">
            
            <button onclick="closeModal()" class="absolute top-6 right-6 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Beli Emas</h3>
            <p class="text-sm text-gray-400 mb-6">Tambah gramasi aset ke tabungan anggota.</p>
            
            <div class="space-y-5">
    <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Nama Anggota</label>
        <input type="text" id="inputNama" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#d4af37] focus:bg-white transition-colors" placeholder="Contoh: Janvis">
    </div>
    
    <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Type Emas</label>
        <select id="inputJenis" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#d4af37] focus:bg-white transition-colors">
            <option value="Antam">Antam</option>
            <option value="UBS">UBS</option>
            <option value="Galeri24">Galeri24</option>
            <option value="Lokal">Lokal</option>
            <option value="Lainnya">Lainnya</option>
        </select>
    </div>

    <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Jumlah Beli (Gram)</label>
        <div class="relative">
            <input type="number" step="0.0001" id="inputGram" class="w-full bg-gray-50 border border-gray-200 rounded-2xl pl-5 pr-14 py-4 focus:outline-none focus:border-[#d4af37] focus:bg-white transition-colors" placeholder="0.5000">
            <span class="absolute right-5 top-4 text-gray-400 font-bold">gr</span>
        </div>
    </div>
    
    <button onclick="submitForm()" id="btnSubmit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg hover:bg-black transition-colors">
        Konfirmasi Pembelian Emas
    </button>
</div>

    <script>
        // GANTI DENGAN URL DEPLOYMENT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVqzxORjyzdiKMlnhaThqJGsmqyErUd0dShzqieKVJglJb4XPPuygAByxwdO1cp-1sPg/exec";

        function loadDashboard() {
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?callback=renderData`;
            document.body.appendChild(script);
        }

        function renderData(data) {
            document.getElementById("balance-idr").innerText = "Rp " + data.totalBalanceIDR.toLocaleString("id-ID");
            const container = document.getElementById("user-list");
            container.innerHTML = "";

            data.users.forEach(user => {
                container.innerHTML += `
                <div class="glass-card rounded-[25px] p-4 transition-transform hover:-translate-y-1">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-[#d4af37]/10 border border-[#d4af37]/20 flex items-center justify-center font-bold text-gold">
                                ${user.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">${user.name}</h4>
                                <p class="text-xs text-gray-400">Pemilik Tabungan</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h4 class="font-bold text-gold text-lg">${user.gram} gr</h4>
                            <p class="text-xs text-gray-400">Emas</p>
                        </div>
                    </div>
                </div>
                `;
            });
        }

        function openModal() {
            document.getElementById('modalTambah').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('modalTambah').classList.add('hidden');
            document.getElementById('inputNama').value = "";
            document.getElementById('inputGram').value = "";
        }

                        return;function submitForm() {
    const nama = document.getElementById('inputNama').value;
    const gram = document.getElementById('inputGram').value;
    const btn = document.getElementById('btnSubmit');

    if(!nama || !gram) return alert("Mohon isi semua data!");

    // 1. Ubah UI Instan agar user merasa aplikasi responsif
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sedang Memproses...';
    btn.classList.add('opacity-70');
    btn.disabled = true;

    // 2. Timeout untuk mencegah user mengklik berkali-kali
    const script = document.createElement("script");
    script.src = `${SCRIPT_URL}?action=addBalance&name=${encodeURIComponent(nama)}&jenis=${encodeURIComponent(document.getElementById('inputJenis').value)}&gram=${encodeURIComponent(gram)}&callback=onSuccessSubmit`;
    
    // 3. Tambahkan error handling jika Google gagal merespons
    script.onerror = function() {
        alert("Server Google lambat, mohon tunggu sebentar atau refresh halaman.");
        btn.innerHTML = "Konfirmasi Pembelian Emas";
        btn.disabled = false;
    };
    
    document.body.appendChild(script);
}

        function onSuccessSubmit(response) {
            alert("Pembelian emas berhasil dicatat!");
            closeModal();
            
            document.getElementById('btnSubmit').innerText = "Konfirmasi Pembelian Emas";
            document.getElementById('btnSubmit').disabled = false;
            
            document.getElementById("balance-idr").innerText = "Memuat Data...";
            document.getElementById("user-list").innerHTML = "";
            loadDashboard();
        }

        window.onload = loadDashboard;
    </script>

    <style>
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</body>
</html>
