<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Emas Kita</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #ffffff 0%, #fdfbf7 50%, #f9f6ea 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.05); 
        }
        .gold-premium-card { 
            background: linear-gradient(135deg, #E6C27A 0%, #FCEABB 45%, #D4AF37 100%); 
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }
        .text-gold { color: #d4af37; }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div id="dashboardView" class="max-w-md mx-auto px-5 py-8">
        <div class="mb-8 flex justify-between items-center">
            <span class="inline-flex items-center px-4 py-2 rounded-full glass text-sm font-semibold text-gold">
                ✨ Smart Gold Saving
            </span>
            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100 relative">
                <i class="fa-regular fa-bell text-gray-500"></i>
            </div>
        </div>

        <div class="gold-premium-card rounded-[35px] px-6 pt-6 pb-8 mb-6 relative overflow-hidden">
            <div class="absolute -right-12 -top-12 w-32 h-32 bg-white opacity-40 rounded-full blur-md"></div>
            <p class="text-[#5C4308] text-sm font-semibold relative z-10 uppercase tracking-wider">Total Tabungan Emas</p>
            <h2 id="balance-total" class="text-4xl font-bold text-gray-900 mt-2 relative z-10 drop-shadow-sm">Memuat...</h2>
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/40 backdrop-blur-sm border border-white/60 mt-4 text-xs font-bold text-[#5C4308] relative z-10 shadow-sm">🪙 Tabungan Emas Digital</div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <button onclick="openMemberView()" class="group flex flex-col items-center justify-center gap-1 w-full h-16 px-4 bg-gradient-to-br from-[#F9F5E1] via-white to-[#F3E2A9] rounded-full text-gray-800 shadow-sm hover:shadow-md transition-all duration-200">
                <div class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-[#92400e] shadow-sm"><i class="fa-solid fa-users text-sm"></i></div>
                <span class="font-semibold text-[9px] uppercase tracking-[0.18em]">Anggota</span>
            </button>
            <button onclick="openModalBeli()" class="group flex flex-col items-center justify-center gap-1 w-full h-16 px-4 bg-gradient-to-br from-white via-[#E5E7EB] to-[#D1D5DB] rounded-full text-gray-800 shadow-sm hover:shadow-md transition-all duration-200">
                <div class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-[#1f2937] shadow-sm"><i class="fa-solid fa-arrow-trend-up text-sm"></i></div>
                <span class="font-semibold text-[9px] uppercase tracking-[0.18em]">Beli</span>
            </button>
            <button onclick="openModalJual()" class="group flex flex-col items-center justify-center gap-1 w-full h-16 px-4 bg-gradient-to-br from-[#FDE68A] via-[#FCD34D] to-[#FBBF24] rounded-full text-gray-800 shadow-sm hover:shadow-md transition-all duration-200">
                <div class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-[#D4AF37] shadow-sm"><i class="fa-solid fa-hand-holding-dollar text-sm"></i></div>
                <span class="font-semibold text-[9px] uppercase tracking-[0.18em]">Jual</span>
            </button>
        </div>

        <div class="mt-2 mb-8">
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider">TRANSAKSI TERAKHIR</h3>
                <button onclick="document.getElementById('modalBulan').classList.remove('hidden')" class="text-gray-400 hover:text-gray-900">
                    <i class="fa-solid fa-glasses"></i>
                </button>
            </div>
            <div id="transaction-list" class="space-y-3">
                <p class="text-xs text-gray-400 text-center py-4">Memuat transaksi...</p>
            </div>
        </div>
    </div>

    <div id="modalBulan" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-xs rounded-[30px] p-6 shadow-2xl">
            <h3 class="font-bold text-lg mb-4">Pilih Bulan</h3>
            <select id="selectBulan" class="w-full p-3 border border-gray-200 rounded-xl mb-4 bg-gray-50">
                <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
            <button onclick="loadMonthly()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold">Tampilkan</button>
            <button onclick="document.getElementById('modalBulan').classList.add('hidden')" class="w-full mt-2 text-sm text-gray-500">Tutup</button>
        </div>
    </div>

    <div id="memberScreen" class="max-w-md mx-auto px-5 py-8 hidden">
        <div class="flex items-center justify-between mb-6">
            <div><h3 class="font-bold text-2xl text-gray-900">Daftar Anggota</h3></div>
            <button onclick="closeMemberView()" class="w-11 h-11 rounded-full bg-white shadow-sm border border-gray-200 flex items-center justify-center text-gray-700"><i class="fa-solid fa-glasses text-lg"></i></button>
        </div>
        <div class="overflow-x-auto pb-4 -mx-5 px-5 snap-x snap-mandatory hide-scrollbar" id="memberSlider"><div id="user-list" class="flex gap-4"></div></div>
        <div id="memberDots" class="flex items-center justify-center gap-2 mt-2"></div>
    </div>

    <div id="modalBeli" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[30px] p-8 shadow-2xl relative"><button onclick="closeModalBeli()" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-xmark"></i></button><h3 class="text-2xl font-bold mb-6">Beli Emas</h3><div class="space-y-4"><input type="text" id="inputNama" class="w-full bg-gray-50 border rounded-2xl px-5 py-4" placeholder="Nama"><select id="inputJenis" class="w-full bg-gray-50 border rounded-2xl px-5 py-4"><option>Antam</option><option>UBS</option></select><input type="number" id="inputGram" class="w-full bg-gray-50 border rounded-2xl px-5 py-4" placeholder="Gram"><button onclick="submitBeli()" id="btnSubmitBeli" class="w-full bg-gray-900 text-white py-4 rounded-2xl">Konfirmasi</button></div></div>
    </div>

    <div id="modalJual" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[30px] p-8 shadow-2xl relative"><button onclick="closeModalJual()" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-xmark"></i></button><h3 class="text-2xl font-bold mb-6">Jual Emas</h3><div class="space-y-4"><select id="jualNama" onchange="updateJenisJual()" class="w-full bg-gray-50 border rounded-2xl px-5 py-4"></select><select id="jualJenis" class="w-full bg-gray-50 border rounded-2xl px-5 py-4"></select><input type="number" id="jualGram" class="w-full bg-gray-50 border rounded-2xl px-5 py-4" placeholder="Gram"><button onclick="submitJual()" id="btnSubmitJual" class="w-full bg-red-600 text-white py-4 rounded-2xl">Konfirmasi</button></div></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVqzxORjyzdiKMlnhaThqJGsmqyErUd0dShzqieKVJglJb4XPPuygAByxwdO1cp-1sPg/exec";
        let memberData = {};
        
        function loadDashboard() {
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?callback=renderData`;
            document.body.appendChild(script);
        }

        function renderData(data) {
            document.getElementById("balance-total").innerText = data.totalGram + " gr";
            renderUserList(data.users);
            
            // Tampilkan 7 transaksi terakhir
            renderTransactionList((data.transactions || []).slice(0, 7), "Transaksi Terbaru");
        }

        function renderTransactionList(list, title) {
            const container = document.getElementById("transaction-list");
            container.innerHTML = `<h4 class="text-[10px] text-gray-400 mb-2 uppercase">${title}</h4>`;
            if (list.length === 0) container.innerHTML += `<p class="text-xs text-gray-400 text-center py-4">Tidak ada data.</p>`;
            list.forEach(t => {
                const isBeli = t.type === 'BELI';
                container.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full ${isBeli ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'} flex items-center justify-center">
                            <i class="fa-solid ${isBeli ? 'fa-arrow-down' : 'fa-arrow-up'} text-xs"></i>
                        </div>
                        <div><p class="text-xs font-bold">${t.name}</p><p class="text-[9px] text-gray-400">${t.gold} • ${t.date}</p></div>
                    </div>
                    <p class="text-xs font-bold ${isBeli ? 'text-emerald-600' : 'text-rose-600'}">${isBeli ? '+' : '-'}${Number(t.gram).toFixed(4)} gr</p>
                </div>`;
            });
        }

        function loadMonthly() {
            const month = document.getElementById('selectBulan').value;
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=getMonthlyTransactions&month=${month}&callback=showFullTrans`;
            document.body.appendChild(script);
        }

        function showFullTrans(data) {
            renderTransactionList(data, "Semua Transaksi Bulan Terpilih");
            document.getElementById('modalBulan').classList.add('hidden');
        }

        // Fungsi pendukung lainnya (openModal, etc) sama seperti sebelumnya...
        function renderUserList(users) { /* ... logik slider ... */ }
        function openMemberView() { document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('memberScreen').classList.remove('hidden'); }
        function closeMemberView() { document.getElementById('memberScreen').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden'); }
        function openModalBeli() { document.getElementById('modalBeli').classList.remove('hidden'); }
        function closeModalBeli() { document.getElementById('modalBeli').classList.add('hidden'); }
        function openModalJual() { document.getElementById('modalJual').classList.remove('hidden'); const s = document.createElement("script"); s.src = `${SCRIPT_URL}?action=getMembers&callback=initJual`; document.body.appendChild(s); }
        function closeModalJual() { document.getElementById('modalJual').classList.add('hidden'); }
        function initJual(data) { memberData = data; const select = document.getElementById('jualNama'); select.innerHTML = '<option value="">Pilih Anggota</option>'; Object.keys(data).forEach(n => select.innerHTML += `<option value="${n}">${n}</option>`); }
        function updateJenisJual() { const n = document.getElementById('jualNama').value; const s = document.getElementById('jualJenis'); s.innerHTML = '<option value="">Pilih Jenis</option>'; if(memberData[n]) Object.keys(memberData[n]).forEach(j => s.innerHTML += `<option value="${j}">${j}</option>`); }
        function submitBeli() { /* ... */ }
        function submitJual() { /* ... */ }
        function onSuccessSubmit() { alert("Berhasil!"); location.reload(); }
        window.onload = loadDashboard;
    </script>
</body>
</html>
