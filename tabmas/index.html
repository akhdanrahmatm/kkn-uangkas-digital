<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Emas Kita</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            min-height: 100vh; 
            background: #F8F9FA; /* Warna background abu-abu sangat muda yang bersih */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; 
        }
        .text-gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Style scrollbar tipis untuk user list */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto px-5 py-8">
        
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">Tabungan Emas</h1>
                <p class="text-sm text-gray-500">Kelola aset digital Anda</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100 relative">
                <i class="fa-regular fa-bell text-gray-600"></i>
                <span class="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
            </div>
        </div>

        <div class="bg-white rounded-[28px] p-7 mb-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-gradient-to-br from-[#E6C27A] to-[#D4AF37] opacity-[0.08] rounded-full blur-2xl pointer-events-none"></div>
            
            <div class="flex items-center gap-2 mb-3 relative z-10">
                <div class="w-8 h-8 rounded-full bg-yellow-50 flex items-center justify-center text-[#d4af37]">
                    <i class="fa-solid fa-wallet text-sm"></i>
                </div>
                <p class="text-gray-500 text-sm font-medium">Total Saldo Grup</p>
            </div>
            
            <h2 id="balance-total" class="text-4xl font-extrabold text-gray-900 tracking-tight relative z-10">
                <span class="animate-pulse text-gray-300">Memuat...</span>
            </h2>
            
            <div class="mt-4 flex items-center gap-2 relative z-10">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-green-50 text-green-600 text-xs font-semibold">
                    <i class="fa-solid fa-arrow-trend-up text-[10px]"></i> Live Update
                </span>
                <span class="text-xs text-gray-400 font-medium">Terhubung ke Database</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="openModalBeli()" class="group flex flex-col items-center justify-center p-4 bg-gray-900 rounded-[24px] text-white shadow-lg shadow-gray-900/20 transition-all hover:-translate-y-1 active:scale-95">
                <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mb-3 group-hover:bg-white/20 transition-colors">
                    <i class="fa-solid fa-arrow-trend-up text-xl text-[#E6C27A]"></i>
                </div>
                <span class="font-bold text-sm tracking-wide">Beli Emas</span>
            </button>
            
            <button onclick="openModalJual()" class="group flex flex-col items-center justify-center p-4 bg-white border-2 border-transparent shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] text-gray-800 transition-all hover:border-[#D4AF37]/30 hover:-translate-y-1 active:scale-95">
                <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mb-3 group-hover:bg-yellow-50 transition-colors">
                    <i class="fa-solid fa-hand-holding-dollar text-xl text-[#D4AF37]"></i>
                </div>
                <span class="font-bold text-sm tracking-wide">Jual Emas</span>
            </button>
        </div>

        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="font-bold text-gray-800 text-lg">Daftar Anggota</h3>
            <span class="text-xs font-semibold text-[#d4af37] bg-yellow-50 px-3 py-1 rounded-full">Real-time</span>
        </div>
        <div id="user-list" class="space-y-3 pb-10"></div>
    </div>


    <div id="modalBeli" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[30px] p-8 shadow-2xl relative animate-fade-in-up">
            <button onclick="closeModalBeli()" class="absolute top-6 right-6 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-2xl font-bold text-gray-900 mb-1">Beli Emas</h3>
            <p class="text-sm text-gray-500 mb-6">Pencatatan penambahan aset anggota.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase">Nama Anggota</label>
                    <input type="text" id="inputNama" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-gray-900 focus:ring-1 focus:ring-gray-900 transition-all" placeholder="Contoh: Budi">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase">Jenis Emas</label>
                    <select id="inputJenis" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-gray-900 transition-all appearance-none">
                        <option value="Antam">Antam</option>
                        <option value="UBS">UBS</option>
                        <option value="Galeri24">Galeri24</option>
                        <option value="Lokal">Lokal</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase">Jumlah Beli</label>
                    <div class="relative">
                        <input type="number" step="0.0001" id="inputGram" class="w-full bg-gray-50 border border-gray-200 rounded-2xl pl-5 pr-14 py-4 focus:outline-none focus:border-gray-900 transition-all" placeholder="0.0000">
                        <span class="absolute right-5 top-4 text-gray-400 font-bold">gr</span>
                    </div>
                </div>
                <button onclick="submitBeli()" id="btnSubmitBeli" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl mt-6 shadow-lg hover:bg-black transition-transform active:scale-95">
                    Konfirmasi Pembelian
                </button>
            </div>
        </div>
    </div>


    <div id="modalJual" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[30px] p-8 shadow-2xl relative animate-fade-in-up">
            <button onclick="closeModalJual()" class="absolute top-6 right-6 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-2xl font-bold text-gray-900 mb-1">Jual Emas</h3>
            <p class="text-sm text-gray-500 mb-6">Pencatatan penarikan aset anggota.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase">Pilih Anggota</label>
                    <select id="jualNama" onchange="updateJenisJual()" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-gray-900 transition-all appearance-none">
                        <option value="">Memuat Anggota...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase">Pilih Jenis Emas</label>
                    <select id="jualJenis" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-gray-900 transition-all appearance-none">
                        <option value="">Pilih Jenis Emas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase">Jumlah Jual</label>
                    <div class="relative">
                        <input type="number" step="0.0001" id="jualGram" class="w-full bg-gray-50 border border-gray-200 rounded-2xl pl-5 pr-14 py-4 focus:outline-none focus:border-gray-900 transition-all" placeholder="0.0000">
                        <span class="absolute right-5 top-4 text-gray-400 font-bold">gr</span>
                    </div>
                </div>
                <button onclick="submitJual()" id="btnSubmitJual" class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl mt-6 shadow-lg hover:bg-red-700 transition-transform active:scale-95">
                    Konfirmasi Penjualan
                </button>
            </div>
        </div>
    </div>


    <script>
        // URL SCRIPT ANDA (Tetap sesuai dengan yang terakhir di HTML Anda)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVqzxORjyzdiKMlnhaThqJGsmqyErUd0dShzqieKVJglJb4XPPuygAByxwdO1cp-1sPg/exec";
        
        // Simpan data anggota untuk dropdown Jual
        let memberData = {};

        // -----------------------------------------
        // 1. FUNGSI DASHBOARD UTAMA
        // -----------------------------------------
        function loadDashboard() {
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?callback=renderData`;
            document.body.appendChild(script);
        }

        function renderData(data) {
            document.getElementById("balance-total").innerText = data.totalGram + " gr";
            const container = document.getElementById("user-list");
            container.innerHTML = "";
            
            if (!data.users || data.users.length === 0) {
                container.innerHTML = `<div class="bg-white p-6 rounded-2xl border border-gray-100 text-center"><p class="text-gray-400 text-sm">Belum ada data tabungan.</p></div>`;
                return;
            }

            data.users.forEach(user => {
                container.innerHTML += `
                <div class="bg-white rounded-[20px] p-4 border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] transition-all hover:border-gray-200">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-11 h-11 rounded-full bg-gray-50 flex items-center justify-center font-bold text-gray-700 text-lg border border-gray-100">
                                ${user.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900">${user.name}</h4>
                                <p class="text-[11px] font-medium text-gray-400 uppercase tracking-wide">Pemilik</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h4 class="font-bold text-[#d4af37] text-lg">${user.gram} <span class="text-sm">gr</span></h4>
                        </div>
                    </div>
                </div>`;
            });
        }

        // -----------------------------------------
        // 2. FUNGSI BELI EMAS
        // -----------------------------------------
        function openModalBeli() { 
            document.getElementById('modalBeli').classList.remove('hidden'); 
        }
        
        function closeModalBeli() { 
            document.getElementById('modalBeli').classList.add('hidden');
            document.getElementById('inputNama').value = "";
            document.getElementById('inputGram').value = "";
        }

        function submitBeli() {
            const nama = document.getElementById('inputNama').value.trim();
            const jenis = document.getElementById('inputJenis').value;
            const gram = document.getElementById('inputGram').value;
            const btn = document.getElementById('btnSubmitBeli');

            if(!nama || !gram) return alert("Mohon isi Nama Anggota dan Jumlah Gram!");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;

            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=addBalance&name=${encodeURIComponent(nama)}&jenis=${encodeURIComponent(jenis)}&gram=${encodeURIComponent(gram)}&callback=onSuccessSubmit`;
            document.body.appendChild(script);
        }


        // -----------------------------------------
        // 3. FUNGSI JUAL EMAS
        // -----------------------------------------
        function openModalJual() {
            document.getElementById('modalJual').classList.remove('hidden');
            const selectNama = document.getElementById('jualNama');
            selectNama.innerHTML = '<option value="">Sedang mengambil data...</option>';
            
            // Mengambil data anggota dari Spreadsheet
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=getMembers&callback=initJual`;
            document.body.appendChild(script);
        }

        function closeModalJual() {
            document.getElementById('modalJual').classList.add('hidden');
            document.getElementById('jualGram').value = "";
        }

        function initJual(data) {
            memberData = data; 
            const select = document.getElementById('jualNama');
            select.innerHTML = '<option value="">Pilih Anggota</option>';
            
            Object.keys(data).forEach(name => {
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        function updateJenisJual() {
            const nama = document.getElementById('jualNama').value;
            const selectJenis = document.getElementById('jualJenis');
            selectJenis.innerHTML = '<option value="">Pilih Jenis Emas</option>';
            
            if (memberData[nama]) {
                Object.keys(memberData[nama]).forEach(jenis => {
                    const saldoJenis = memberData[nama][jenis];
                    if (saldoJenis > 0) { 
                        selectJenis.innerHTML += `<option value="${jenis}">${jenis} (Sisa: ${saldoJenis.toFixed(4)} gr)</option>`;
                    }
                });
            }
        }

        function submitJual() {
            const nama = document.getElementById('jualNama').value;
            const jenis = document.getElementById('jualJenis').value;
            const gram = document.getElementById('jualGram').value;
            const btn = document.getElementById('btnSubmitJual');

            if(!nama || !jenis || !gram) return alert("Mohon lengkapi pilihan Anggota, Jenis Emas, dan Jumlah Jual!");

            if(Number(gram) > memberData[nama][jenis]) {
                return alert(`Saldo tidak cukup! Maksimal yang bisa dijual: ${memberData[nama][jenis]} gr.`);
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;

            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=sellBalance&name=${encodeURIComponent(nama)}&jenis=${encodeURIComponent(jenis)}&gram=${encodeURIComponent(gram)}&callback=onSuccessSubmit`;
            document.body.appendChild(script);
        }

        // -----------------------------------------
        // 4. KONTROL UMUM
        // -----------------------------------------
        function onSuccessSubmit() {
            alert("Transaksi Berhasil Dicatat!");
            location.reload(); 
        }

        window.onload = loadDashboard;
        
    </script>
</body>
</html>
