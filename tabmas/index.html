<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Emas Kita</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #ffffff 0%, #fdfbf7 50%, #f9f6ea 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.05); 
        }
        .glass-card { 
            background: #ffffff; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.08), inset 0 1px rgba(255, 255, 255, 1); 
        }
        .gold-premium-card { 
            background: linear-gradient(135deg, #E6C27A 0%, #FCEABB 45%, #D4AF37 100%); 
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }
        .text-gold { color: #d4af37; }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto px-5 py-8">
        
        <div class="mb-8 flex justify-between items-center">
            <span class="inline-flex items-center px-4 py-2 rounded-full glass text-sm font-semibold text-gold">
                ✨ Smart Gold Saving
            </span>
            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center shadow-sm">
                <i class="fa-regular fa-bell text-gray-500"></i>
            </div>
        </div>

        <div class="gold-premium-card rounded-[35px] px-6 pt-6 pb-8 mb-8 relative overflow-hidden">
            <div class="absolute -right-12 -top-12 w-32 h-32 bg-white opacity-40 rounded-full blur-md"></div>
            
            <p class="text-[#5C4308] text-sm font-semibold relative z-10 uppercase tracking-wider">
                Total Tabungan Emas
            </p>
            
            <h2 id="balance-total" class="text-4xl font-bold text-gray-900 mt-2 relative z-10 drop-shadow-sm">
                Memuat...
            </h2>
            
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/40 backdrop-blur-sm border border-white/60 mt-4 text-xs font-bold text-[#5C4308] relative z-10 shadow-sm">
                🪙 Tabungan Emas Digital
            </div>
            
            <div class="flex justify-between items-center mt-8 relative z-10 px-1">
                <button onclick="openModalBeli()" class="flex flex-col items-center gap-2 group transition-transform hover:scale-105">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-arrow-trend-up text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Beli</span>
                </button>
                
                <button onclick="openModalJual()" class="flex flex-col items-center gap-2 group transition-transform hover:scale-105">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-hand-holding-dollar text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Jual</span>
                </button>
                
                <button onclick="alert('Fitur Riwayat segera hadir!')" class="flex flex-col items-center gap-2 group transition-transform hover:scale-105">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-receipt text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Riwayat</span>
                </button>
                
                <button onclick="alert('Fitur Target segera hadir!')" class="flex flex-col items-center gap-2 group transition-transform hover:scale-105">
                    <div class="w-14 h-14 bg-gray-900 rounded-[20px] flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-bullseye text-lg"></i>
                    </div>
                    <span class="text-[11px] font-bold text-[#5C4308]">Target</span>
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-semibold text-gray-800 text-lg">Anggota</h3>
            <span class="glass px-3 py-1 rounded-full text-xs font-medium text-gray-500">Live Data</span>
        </div>
        <div id="user-list" class="space-y-3 pb-10"></div>
    </div>


    <div id="modalBeli" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:p-4 transition-all">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[30px] p-8 shadow-2xl relative animate-fade-in-up">
            <button onclick="closeModalBeli()" class="absolute top-6 right-6 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Beli Emas</h3>
            <p class="text-sm text-gray-400 mb-6">Tambah gramasi aset ke tabungan anggota.</p>
            
            <div class="space-y-4">
                <input type="text" id="inputNama" class="w-full bg-gray-50 border rounded-2xl px-5 py-4 focus:outline-none focus:border-[#d4af37]" placeholder="Nama Anggota (Contoh: Budi)">
                <select id="inputJenis" class="w-full bg-gray-50 border rounded-2xl px-5 py-4 focus:outline-none focus:border-[#d4af37]">
                    <option value="Antam">Antam</option>
                    <option value="UBS">UBS</option>
                    <option value="Galeri24">Galeri24</option>
                    <option value="Lokal">Lokal</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
                <div class="relative">
                    <input type="number" step="0.0001" id="inputGram" class="w-full bg-gray-50 border rounded-2xl pl-5 pr-14 py-4 focus:outline-none focus:border-[#d4af37]" placeholder="Jumlah Beli (Contoh: 0.500)">
                    <span class="absolute right-5 top-4 text-gray-400 font-bold">gr</span>
                </div>
                <button onclick="submitBeli()" id="btnSubmitBeli" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg hover:bg-black transition-colors">
                    Konfirmasi Pembelian
                </button>
            </div>
        </div>
    </div>


    <div id="modalJual" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex justify-center items-end sm:items-center pb-0 sm:p-4 transition-all">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[30px] p-8 shadow-2xl relative animate-fade-in-up">
            <button onclick="closeModalJual()" class="absolute top-6 right-6 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Jual Emas</h3>
            <p class="text-sm text-gray-400 mb-6">Pilih anggota dan jenis emas yang ingin dijual.</p>
            
            <div class="space-y-4">
                <select id="jualNama" onchange="updateJenisJual()" class="w-full bg-gray-50 border rounded-2xl px-5 py-4 focus:outline-none focus:border-[#d4af37]">
                    <option value="">Memuat Anggota...</option>
                </select>
                <select id="jualJenis" class="w-full bg-gray-50 border rounded-2xl px-5 py-4 focus:outline-none focus:border-[#d4af37]">
                    <option value="">Pilih Jenis Emas</option>
                </select>
                <div class="relative">
                    <input type="number" step="0.0001" id="jualGram" class="w-full bg-gray-50 border rounded-2xl pl-5 pr-14 py-4 focus:outline-none focus:border-[#d4af37]" placeholder="Jumlah Jual">
                    <span class="absolute right-5 top-4 text-gray-400 font-bold">gr</span>
                </div>
                <button onclick="submitJual()" id="btnSubmitJual" class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg hover:bg-red-700 transition-colors">
                    Jual Sekarang
                </button>
            </div>
        </div>
    </div>


    <script>
        // GANTI URL DI BAWAH JIKA ANDA MELAKUKAN DEPLOYMENT BARU
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVqzxORjyzdiKMlnhaThqJGsmqyErUd0dShzqieKVJglJb4XPPuygAByxwdO1cp-1sPg/exec";
        
        // Simpan data anggota untuk dropdown Jual
        let memberData = {};

        // -----------------------------------------
        // 1. FUNGSI DASHBOARD UTAMA
        // -----------------------------------------
        function loadDashboard() {
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?callback=renderData`;
            document.body.appendChild(script);
        }

        function renderData(data) {
            document.getElementById("balance-total").innerText = data.totalGram + " gr";
            const container = document.getElementById("user-list");
            container.innerHTML = "";
            
            if (!data.users || data.users.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 text-sm mt-4">Belum ada data tabungan.</p>`;
                return;
            }

            data.users.forEach(user => {
                container.innerHTML += `
                <div class="glass-card rounded-[25px] p-4 transition-transform hover:-translate-y-1">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-[#d4af37]/10 border border-[#d4af37]/20 flex items-center justify-center font-bold text-gold text-lg">
                                ${user.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800">${user.name}</h4>
                                <p class="text-xs text-gray-400">Pemilik Tabungan</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h4 class="font-bold text-gold text-lg">${user.gram} gr</h4>
                        </div>
                    </div>
                </div>`;
            });
        }

        // -----------------------------------------
        // 2. FUNGSI BELI EMAS
        // -----------------------------------------
        function openModalBeli() { 
            document.getElementById('modalBeli').classList.remove('hidden'); 
        }
        
        function closeModalBeli() { 
            document.getElementById('modalBeli').classList.add('hidden');
            document.getElementById('inputNama').value = "";
            document.getElementById('inputGram').value = "";
        }

        function submitBeli() {
            const nama = document.getElementById('inputNama').value.trim();
            const jenis = document.getElementById('inputJenis').value;
            const gram = document.getElementById('inputGram').value;
            const btn = document.getElementById('btnSubmitBeli');

            if(!nama || !gram) return alert("Mohon isi Nama Anggota dan Jumlah Gram!");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;

            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=addBalance&name=${encodeURIComponent(nama)}&jenis=${encodeURIComponent(jenis)}&gram=${encodeURIComponent(gram)}&callback=onSuccessSubmit`;
            document.body.appendChild(script);
        }


        // -----------------------------------------
        // 3. FUNGSI JUAL EMAS
        // -----------------------------------------
        function openModalJual() {
            document.getElementById('modalJual').classList.remove('hidden');
            const selectNama = document.getElementById('jualNama');
            selectNama.innerHTML = '<option value="">Sedang mengambil data...</option>';
            
            // Mengambil data anggota dari Spreadsheet
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=getMembers&callback=initJual`;
            document.body.appendChild(script);
        }

        function closeModalJual() {
            document.getElementById('modalJual').classList.add('hidden');
            document.getElementById('jualGram').value = "";
        }

        function initJual(data) {
            memberData = data; // Menyimpan data di memori
            const select = document.getElementById('jualNama');
            select.innerHTML = '<option value="">Pilih Anggota</option>';
            
            Object.keys(data).forEach(name => {
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        // Fungsi ini otomatis dipanggil saat nama dipilih
        function updateJenisJual() {
            const nama = document.getElementById('jualNama').value;
            const selectJenis = document.getElementById('jualJenis');
            selectJenis.innerHTML = '<option value="">Pilih Jenis Emas</option>';
            
            if (memberData[nama]) {
                Object.keys(memberData[nama]).forEach(jenis => {
                    const saldoJenis = memberData[nama][jenis];
                    if (saldoJenis > 0) { // Hanya tampilkan jenis emas yang saldonya masih ada
                        selectJenis.innerHTML += `<option value="${jenis}">${jenis} (Tersedia: ${saldoJenis.toFixed(4)} gr)</option>`;
                    }
                });
            }
        }

        function submitJual() {
            const nama = document.getElementById('jualNama').value;
            const jenis = document.getElementById('jualJenis').value;
            const gram = document.getElementById('jualGram').value;
            const btn = document.getElementById('btnSubmitJual');

            if(!nama || !jenis || !gram) return alert("Mohon lengkapi pilihan Anggota, Jenis Emas, dan Jumlah Jual!");

            // Validasi saldo
            if(Number(gram) > memberData[nama][jenis]) {
                return alert(`Saldo tidak cukup! Maksimal yang bisa dijual: ${memberData[nama][jenis]} gr.`);
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;

            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=sellBalance&name=${encodeURIComponent(nama)}&jenis=${encodeURIComponent(jenis)}&gram=${encodeURIComponent(gram)}&callback=onSuccessSubmit`;
            document.body.appendChild(script);
        }

        // -----------------------------------------
        // 4. KONTROL UMUM
        // -----------------------------------------
        function onSuccessSubmit() {
            alert("Transaksi Berhasil Dicatat!");
            location.reload(); // Memuat ulang halaman agar data terbaru tampil
        }

        // Jalankan saat halaman web pertama kali dibuka
        window.onload = loadDashboard;
        
    </script>
</body>
</html>
