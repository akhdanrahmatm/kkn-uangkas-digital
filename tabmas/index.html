<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Emas Kita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { min-height: 100vh; background: linear-gradient(135deg, #ffffff 0%, #fdfbf7 50%, #f9f6ea 100%); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.3); }
        .gold-premium-card { background: linear-gradient(135deg, #E6C27A 0%, #FCEABB 45%, #D4AF37 100%); }
    </style>
</head>
<body>

    <div id="dashboardView" class="max-w-md mx-auto px-5 py-8">
        <div class="mb-8 flex justify-between items-center">
            <span class="inline-flex items-center px-4 py-2 rounded-full glass text-sm font-semibold text-gold">✨ Smart Gold Saving</span>
        </div>

        <div class="gold-premium-card rounded-[35px] px-6 pt-6 pb-8 mb-6 relative overflow-hidden shadow-2xl">
            <p class="text-[#5C4308] text-sm font-semibold relative z-10 uppercase">Total Tabungan Emas</p>
            <h2 id="balance-total" class="text-4xl font-bold text-gray-900 mt-2 relative z-10">Memuat...</h2>
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/40 backdrop-blur-sm mt-4 text-xs font-bold text-[#5C4308] relative z-10">🪙 Tabungan Emas Digital</div>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <button onclick="openMemberView()" class="flex flex-col items-center justify-center gap-1 h-16 bg-white rounded-3xl shadow-sm border text-gray-800"><i class="fa-solid fa-users text-sm"></i><span class="text-[9px] uppercase">Anggota</span></button>
            <button onclick="openModalBeli()" class="flex flex-col items-center justify-center gap-1 h-16 bg-white rounded-3xl shadow-sm border text-gray-800"><i class="fa-solid fa-plus text-sm"></i><span class="text-[9px] uppercase">Beli</span></button>
            <button onclick="openModalJual()" class="flex flex-col items-center justify-center gap-1 h-16 bg-white rounded-3xl shadow-sm border text-gray-800"><i class="fa-solid fa-minus text-sm"></i><span class="text-[9px] uppercase">Jual</span></button>
            <button onclick="openModalBulan()" class="flex flex-col items-center justify-center gap-1 h-16 bg-yellow-100 rounded-3xl shadow-sm border border-yellow-200 text-yellow-800"><i class="fa-solid fa-file-invoice text-sm"></i><span class="text-[9px] uppercase">Statement</span></button>
        </div>

        <div class="mt-2 mb-8">
            <h3 class="text-sm font-bold text-gray-900 mb-4 px-1 uppercase tracking-wider">TRANSAKSI TERAKHIR</h3>
            <div id="transaction-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="memberScreen" class="max-w-md mx-auto px-5 py-8 hidden">
        <div class="flex items-center justify-between mb-6">
            <h3 class="font-bold text-2xl text-gray-900">Daftar Anggota</h3>
            <button onclick="closeMemberView()" class="w-11 h-11 rounded-full bg-white shadow-sm border flex items-center justify-center text-gray-700"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="user-list" class="flex flex-col gap-4"></div>
    </div>

    <div id="modalBulan" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-xs rounded-[30px] p-6 shadow-2xl">
            <h3 class="font-bold text-lg mb-4">Pilih Bulan</h3>
            <div id="listBulan" class="space-y-2 mb-4">
                <button onclick="loadMonthly('04')" class="w-full p-3 bg-gray-50 rounded-xl font-bold">April</button>
                <button onclick="loadMonthly('05')" class="w-full p-3 bg-gray-50 rounded-xl font-bold">Mei</button>
                <button onclick="loadMonthly('06')" class="w-full p-3 bg-gray-50 rounded-xl font-bold">Juni</button>
            </div>
            <button onclick="document.getElementById('modalBulan').classList.add('hidden')" class="w-full mt-2 text-sm text-gray-500">Tutup</button>
        </div>
    </div>

    <div id="modalBeli" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-md rounded-[30px] p-8 shadow-2xl relative"><button onclick="closeModalBeli()" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-xmark"></i></button><h3 class="text-2xl font-bold mb-6">Beli Emas</h3><div class="space-y-4"><input type="text" id="inputNama" class="w-full bg-gray-50 border rounded-2xl px-5 py-4" placeholder="Nama"><select id="inputJenis" class="w-full bg-gray-50 border rounded-2xl px-5 py-4"><option>Antam</option><option>UBS</option><option>Galeri24</option><option>Lokal</option></select><input type="number" id="inputGram" class="w-full bg-gray-50 border rounded-2xl px-5 py-4" placeholder="Gram"><button onclick="submitBeli()" id="btnSubmitBeli" class="w-full bg-gray-900 text-white py-4 rounded-2xl">Konfirmasi</button></div></div>
    </div>

    <div id="modalJual" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-md rounded-[30px] p-8 shadow-2xl relative"><button onclick="closeModalJual()" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-xmark"></i></button><h3 class="text-2xl font-bold mb-6">Jual Emas</h3><div class="space-y-4"><select id="jualNama" onchange="updateJenisJual()" class="w-full bg-gray-50 border rounded-2xl px-5 py-4"></select><select id="jualJenis" class="w-full bg-gray-50 border rounded-2xl px-5 py-4"></select><input type="number" id="jualGram" class="w-full bg-gray-50 border rounded-2xl px-5 py-4" placeholder="Gram"><button onclick="submitJual()" id="btnSubmitJual" class="w-full bg-red-600 text-white py-4 rounded-2xl">Konfirmasi</button></div></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVqzxORjyzdiKMlnhaThqJGsmqyErUd0dShzqieKVJglJb4XPPuygAByxwdO1cp-1sPg/exec";
        let memberData = {};
        
        function loadDashboard() { const s = document.createElement("script"); s.src = `${SCRIPT_URL}?callback=renderData`; document.body.appendChild(s); }
        function renderData(data) {
            document.getElementById("balance-total").innerText = data.totalGram + " gr";
            renderTransactionList((data.transactions || []).slice(0, 7), "Transaksi Terbaru");
            renderUserList(data.users);
        }
        function renderUserList(users) {
            const container = document.getElementById("user-list");
            container.innerHTML = "";
            users.forEach(u => container.innerHTML += `<div class="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center"><div class="font-bold">${u.name}</div><div class="text-yellow-600 font-bold">${u.gram} gr</div></div>`);
        }
        function renderTransactionList(list, title) {
            const container = document.getElementById("transaction-list");
            container.innerHTML = `<h4 class="text-[10px] text-gray-400 mb-2 uppercase">${title}</h4>`;
            list.forEach(t => { const isBeli = t.type === 'BELI'; container.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex items-center justify-between shadow-sm"><div><p class="text-xs font-bold">${t.name}</p><p class="text-[9px] text-gray-400">${t.gold} • ${t.date}</p></div><p class="text-xs font-bold ${isBeli ? 'text-emerald-600' : 'text-rose-600'}">${isBeli ? '+' : '-'}${Number(t.gram).toFixed(4)} gr</p></div>`; });
        }
        function openMemberView() { document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('memberScreen').classList.remove('hidden'); }
        function closeMemberView() { document.getElementById('memberScreen').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden'); }
        function openModalBeli() { document.getElementById('modalBeli').classList.remove('hidden'); }
        function closeModalBeli() { document.getElementById('modalBeli').classList.add('hidden'); }
        function openModalJual() { document.getElementById('modalJual').classList.remove('hidden'); const s = document.createElement("script"); s.src = `${SCRIPT_URL}?action=getMembers&callback=initJual`; document.body.appendChild(s); }
        function closeModalJual() { document.getElementById('modalJual').classList.add('hidden'); }
        function initJual(data) { memberData = data; const select = document.getElementById('jualNama'); select.innerHTML = '<option value="">Pilih Anggota</option>'; Object.keys(data).forEach(n => select.innerHTML += `<option value="${n}">${n}</option>`); }
        function updateJenisJual() { const n = document.getElementById('jualNama').value; const s = document.getElementById('jualJenis'); s.innerHTML = '<option value="">Pilih Jenis</option>'; if(memberData[n]) Object.keys(memberData[n]).forEach(j => s.innerHTML += `<option value="${j}">${j}</option>`); }
        function submitBeli() { const n = document.getElementById('inputNama').value, j = document.getElementById('inputJenis').value, g = document.getElementById('inputGram').value; const s = document.createElement("script"); s.src = `${SCRIPT_URL}?action=addBalance&name=${encodeURIComponent(n)}&jenis=${encodeURIComponent(j)}&gram=${encodeURIComponent(g)}&callback=onSuccessSubmit`; document.body.appendChild(s); }
        function submitJual() { const n = document.getElementById('jualNama').value, j = document.getElementById('jualJenis').value, g = document.getElementById('jualGram').value; const s = document.createElement("script"); s.src = `${SCRIPT_URL}?action=sellBalance&name=${encodeURIComponent(n)}&jenis=${encodeURIComponent(j)}&gram=${encodeURIComponent(g)}&callback=onSuccessSubmit`; document.body.appendChild(s); }
        function openModalBulan() { document.getElementById('modalBulan').classList.remove('hidden'); }
        function loadMonthly(m) { const s = document.createElement("script"); s.src = `${SCRIPT_URL}?action=getMonthlyTransactions&month=${m}&callback=showFullTrans`; document.body.appendChild(s); }
        function showFullTrans(data) { renderTransactionList(data, "Semua Transaksi"); document.getElementById('modalBulan').classList.add('hidden'); }
        function onSuccessSubmit() { alert("Berhasil!"); location.reload(); }
        window.onload = loadDashboard;
    </script>
</body>
</html>
