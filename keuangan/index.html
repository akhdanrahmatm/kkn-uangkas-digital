<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #f8fafc;
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-active: #38bdf8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --pemasukan: #10b981;
            --pengeluaran: #ef4444;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR STYLING --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
        }

        .brand i {
            color: var(--sidebar-active);
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--sidebar-text);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--sidebar-active);
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
        }

        /* --- DASHBOARD CARDS --- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .card-value {
            font-size: 26px;
            font-weight: 700;
        }

        /* --- LAYOUT GRID: FORM & TABLE --- */
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 32px;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            background-color: #f8fafc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--sidebar-active);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--sidebar-bg);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1e293b;
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        /* --- TABLE STYLING --- */
        .table-responsive {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f8fafc;
            padding: 16px 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 24px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-pemasukan {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--pemasukan);
        }

        .badge-pengeluaran {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--pengeluaran);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-vault"></i>
            <span>FinAsisten</span>
        </div>
        <ul class="menu-list">
            <li><a class="menu-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
            <li><a class="menu-item"><i class="fa-solid fa-wallet"></i> Transaksi</a></li>
            <li><a class="menu-item"><i class="fa-solid fa-gear"></i> Pengaturan</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Ringkasan Finansial</h1>
            <span id="current-date" style="color: var(--text-muted); font-weight: 500;"></span>
        </div>

        <div class="summary-grid">
            <div class="card">
                <div class="card-header">
                    <span>Total Saldo Neto</span>
                    <div class="card-icon" style="background-color: rgba(56, 189, 248, 0.1); color: var(--sidebar-active);">
                        <i class="fa-solid fa-scale-balanced"></i>
                    </div>
                </div>
                <div class="card-value" id="total-saldo">Rp 0</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span>Total Pemasukan</span>
                    <div class="card-icon" style="background-color: rgba(16, 185, 129, 0.1); color: var(--pemasukan);">
                        <i class="fa-solid fa-arrow-up-long"></i>
                    </div>
                </div>
                <div class="card-value" id="total-pemasukan" style="color: var(--pemasukan);">Rp 0</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span>Total Pengeluaran</span>
                    <div class="card-icon" style="background-color: rgba(239, 68, 68, 0.1); color: var(--pengeluaran);">
                        <i class="fa-solid fa-arrow-down-long"></i>
                    </div>
                </div>
                <div class="card-value" id="total-pengeluaran" style="color: var(--pengeluaran);">Rp 0</div>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="card">
                <h3 style="margin-bottom: 20px; font-weight: 600; font-size: 18px;">Tambah Transaksi</h3>
                <form id="financialForm">
                    <div class="form-group">
                        <label for="tanggal">Tanggal</label>
                        <input type="date" id="tanggal" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="jenis">Jenis Transaksi</label>
                        <select id="jenis" class="form-control" required>
                            <option value="Pemasukan">Pemasukan</option>
                            <option value="Pengeluaran">Pengeluaran</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="kategori">Kategori</label>
                        <select id="kategori" class="form-control" required>
                            <option value="Gaji / Pendapatan">Gaji / Pendapatan</option>
                            <option value="Makanan & Minuman">Makanan & Minuman</option>
                            <option value="Kebutuhan Rumah Tangga">Kebutuhan Rumah Tangga</option>
                            <option value="Transportasi / Bensin">Transportasi / Bensin</option>
                            <option value="Investasi / Tabungan">Investasi / Tabungan</option>
                            <option value="Hiburan / Hiburan">Hiburan / Jajan</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="jumlah">Jumlah Nilai (Rp)</label>
                        <input type="number" id="jumlah" class="form-control" placeholder="Masukan nominal tanpa titik/koma" required>
                    </div>
                    <div class="form-group">
                        <label for="catatan">Keterangan / Catatan</label>
                        <input type="text" id="catatan" class="form-control" placeholder="Contoh: Beli token listrik bulanan">
                    </div>
                    <button type="submit" class="btn" id="submitBtn">Simpan Transaksi</button>
                </form>
            </div>

            <div>
                <h3 style="margin-bottom: 20px; font-weight: 600; font-size: 18px;">10 Riwayat Transaksi Terakhir</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Kategori</th>
                                <th>Jenis</th>
                                <th>Jumlah</th>
                                <th>Keterangan</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 30px;">
                                    <i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i> Memuat data finansial...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // !! GANTI DENGAN WEB APP URL ANDA YANG DIDAPATKAN SAAT DEPLOY DI GOOGLE APPS SCRIPT !!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyarAddyK0ToIbgSC5-5sJLVbU3dEta9CRvqhmjg2pzXfbO-1jPY_s0BwiKCTlcbbdh/exec";

        // Tampilkan Hari & Tanggal Saat Ini di Atas Dashboard
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        // Fungsi Membaca Data dari Google Sheets (GET Request)
        async function fetchFinancialData() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error("Gagal mengambil data dari server cloud.");
                
                const data = await response.json();
                
                // Update Elemen Tampilan Dashboard Card
                document.getElementById('total-saldo').innerText = formatKeRupiah(data.summary.saldo);
                document.getElementById('total-pemasukan').innerText = formatKeRupiah(data.summary.pemasukan);
                document.getElementById('total-pengeluaran').innerText = formatKeRupiah(data.summary.pengeluaran);

                // Render Data ke Dalam Baris Tabel
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                if (data.transactions.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted)">Belum ada log transaksi.</td></tr>`;
                    return;
                }

                data.transactions.forEach(tx => {
                    const row = document.createElement('tr');
                    const badgeType = tx.jenis === 'Pemasukan' ? 'badge-pemasukan' : 'badge-pengeluaran';
                    const colorValue = tx.jenis === 'Pemasukan' ? 'var(--pemasukan)' : 'var(--pengeluaran)';
                    
                    row.innerHTML = `
                        <td>${formatTanggalIndo(tx.tanggal)}</td>
                        <td>${tx.kategori}</td>
                        <td><span class="badge ${badgeType}">${tx.jenis}</span></td>
                        <td style="font-weight: 600; color: ${colorValue}">${formatKeRupiah(tx.jumlah)}</td>
                        <td style="color: var(--text-muted)">${tx.catatan || '-'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--pengeluaran)">Gagal memuat data keuangan dari cloud database.</td></tr>`;
            }
        }

        // Fungsi Mengirim Entri Data Baru ke Google Sheets (POST Request)
        document.getElementById('financialForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Memproses & Menyimpan...";
            submitBtn.disabled = true;

            const payload = {
                tanggal: document.getElementById('tanggal').value,
                jenis: document.getElementById('jenis').value,
                kategori: document.getElementById('kategori').value,
                jumlah: document.getElementById('jumlah').value,
                catatan: document.getElementById('catatan').value
            };

            try {
                // Menggunakan mode 'no-cors' agar request lokal VS Code tidak diblokir kebijakan browser
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                alert("Transaksi Berhasil Ditambahkan ke Google Sheets!");
                document.getElementById('financialForm').reset();
                // Memuat ulang data dashboard & tabel setelah penyimpanan berhasil
                fetchFinancialData();
            } catch (error) {
                console.error(error);
                alert("Terjadi kendala saat menyimpan transaksi.");
            } finally {
                submitBtn.innerText = "Simpan Transaksi";
                submitBtn.disabled = false;
            }
        });

        // Helper Utility: Mengubah Angka Menjadi Format Rupiah standard ID
        function formatKeRupiah(angka) {
            return "Rp " + Number(angka).toLocaleString('id-ID');
        }

        // Helper Utility: Mempercantik Format Tanggal Internasional ke Format Lokal
        function formatTanggalIndo(stringTanggal) {
            if(!stringTanggal) return '-';
            const opsional = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(stringTanggal).toLocaleDateString('id-ID', opsional);
        }

        // Jalankan pemuatan data secara otomatis saat halaman web dibuka
        window.onload = fetchFinancialData;
    </script>
</body>
</html>
