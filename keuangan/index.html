<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-primary: #f0fdf4; 
            --bg-surface: #ffffff; 
            --primary-accent: #16a34a; 
            --secondary-accent: #22c55e; 
            --text-main: #064e3b; 
            --text-muted: #64748b; 
            --glass-bg: rgba(255, 255, 255, 0.85); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- LAYOUT --- */
        .sidebar { width: 280px; background: var(--glass-bg); padding: 32px; border-right: 1px solid rgba(22, 163, 74, 0.1); display: flex; flex-direction: column; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 120px; }
        
        .brand { font-size: 20px; font-weight: 800; color: var(--primary-accent); margin-bottom: 48px; }
        .menu-item { display: flex; align-items: center; gap: 16px; padding: 14px; cursor: pointer; color: var(--text-muted); text-decoration: none; border-radius: 12px; }
        .menu-item:hover, .menu-item.active { background: #f0fdf4; color: var(--primary-accent); }

        .balance-card { background: linear-gradient(135deg, var(--primary-accent), #047857); color: #fff; border-radius: 24px; padding: 32px; margin-bottom: 32px; }
        .glass-card { background: var(--glass-bg); border-radius: 20px; padding: 28px; border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        /* --- MODAL & FORM --- */
        #form-modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(6,78,59,0.4); backdrop-filter: blur(5px); z-index: 10000; display: none; justify-content: center; align-items: center; }
        .form-modal-box { background: #fff; padding: 32px; border-radius: 24px; width: 90%; max-width: 450px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 15px; -webkit-appearance: none; }
        
        .fab-btn { position: fixed; bottom: 40px; right: 40px; background: var(--primary-accent); color: white; padding: 16px 24px; border-radius: 50px; border: none; cursor: pointer; z-index: 900; }
        
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: var(--glass-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(22, 163, 74, 0.1); justify-content: space-around; align-items: center; z-index: 1000; }
        
        @media (max-width: 900px) { .sidebar { display: none; } .mobile-nav { display: flex; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-wallet"></i> KKN Batang Kabung</div>
        <ul class="menu-list">
            <li><a class="menu-item active" onclick="tampilkanHalaman('dashboard')"><i class="fa-solid fa-grid-2"></i> Dashboard</a></li>
            <li><a class="menu-item" onclick="tampilkanHalaman('laporan')"><i class="fa-solid fa-chart-pie"></i> Laporan</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div id="page-dashboard">
            <div class="balance-card">
                <div class="balance-label">Total Uang Kas</div>
                <div class="balance-amount" id="total-saldo">Rp 0</div>
            </div>
            <div class="glass-card">
                <div class="card-title">Aktivitas Terbaru</div>
                <div class="tx-list" id="transaction-container"></div>
            </div>
        </div>

        <div id="page-laporan" style="display:none;">
            <div class="glass-card">
                <div class="card-title">Grafik Kontribusi per Anggota</div>
                <canvas id="myChart" style="height: 300px;"></canvas>
            </div>
        </div>
    </div>

    <button class="fab-btn" onclick="bukaModalForm()"><i class="fa-solid fa-plus"></i></button>
    <div id="form-modal-overlay">
        <div class="form-modal-box">
            <h3 style="margin-bottom:20px;">Tambah Transaksi</h3>
            <form id="financialForm">
                <input type="date" id="tanggal" class="form-control" required>
                <select id="jenis" class="form-control" onchange="toggleNamaPembayar()">
                    <option value="Pemasukan">Pemasukan</option>
                    <option value="Pengeluaran">Pengeluaran</option>
                </select>
                <select id="nama_pembayar" class="form-control">
                    <option value="Rohimi Fajri">Rohimi Fajri</option>
                    <option value="Zerlinda sonia">Zerlinda sonia</option>
                    <option value="Lainya">Lainya</option>
                </select>
                <input type="number" id="jumlah" class="form-control" placeholder="Nominal" required>
                <input type="text" id="catatan" class="form-control" placeholder="Catatan">
                <button type="submit" class="btn-submit" id="submitBtn">Simpan</button>
            </form>
        </div>
    </div>

    <div class="mobile-nav">
        <a class="nav-link-mobile" onclick="tampilkanHalaman('dashboard')"><i class="fa-solid fa-grid-2"></i><span>Dashboard</span></a>
        <a class="nav-link-mobile" onclick="tampilkanHalaman('laporan')"><i class="fa-solid fa-chart-pie"></i><span>Laporan</span></a>
    </div>

    <script>
        const SCRIPT_URL = "ISI_URL_DEPLOY_ANDA_DI_SINI";
        let chartInstance = null;

        function tampilkanHalaman(page) {
            document.getElementById('page-dashboard').style.display = (page === 'dashboard') ? 'block' : 'none';
            document.getElementById('page-laporan').style.display = (page === 'laporan') ? 'block' : 'none';
            if(page === 'laporan') generateChart();
        }

        function toggleNamaPembayar() {
            document.getElementById('nama_pembayar').style.display = (document.getElementById('jenis').value === 'Pemasukan') ? 'block' : 'none';
        }

        function bukaModalForm() { document.getElementById('form-modal-overlay').style.display = 'flex'; }
        function tutupModalForm() { document.getElementById('form-modal-overlay').style.display = 'none'; }

        async function generateChart() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const summary = {};
            data.transactions.forEach(tx => {
                if(tx.jenis === "Pemasukan") summary[tx.nama_pembayar] = (summary[tx.nama_pembayar] || 0) + tx.jumlah;
            });

            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('myChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(summary), datasets: [{ data: Object.values(summary), backgroundColor: ['#16a34a', '#22c55e', '#4ade80'] }] }
            });
        }

        document.getElementById('financialForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                tanggal: document.getElementById('tanggal').value,
                jenis: document.getElementById('jenis').value,
                nama_pembayar: document.getElementById('jenis').value === 'Pemasukan' ? document.getElementById('nama_pembayar').value : '-',
                kategori: document.getElementById('kategori').value,
                jumlah: document.getElementById('jumlah').value,
                catatan: document.getElementById('catatan').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Data tersimpan!");
            tutupModalForm();
            loadFinancialEngine();
        });

        // Load awal data... (Fungsi loadFinancialEngine sama seperti sebelumnya)
        window.onload = loadFinancialEngine;
    </script>
</body>
</html>
