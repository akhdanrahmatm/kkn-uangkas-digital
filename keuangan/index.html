<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0b0518;
            --bg-surface: #170d2c;
            --primary-accent: #8b5cf6;
            --secondary-accent: #d946ef;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --pemasukan: #10b981;
            --pengeluaran: #f43f5e;
            --border-glow: rgba(139, 92, 246, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* =========================================
           TAMBAHAN: CSS KHUSUS OVERLAY LOGIN GLASS
           ========================================= */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 5, 24, 0.85); /* Background gelap transparan */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 9999; /* Selalu berada paling atas */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(23, 13, 44, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-box i.fa-vault {
            font-size: 40px;
            color: var(--primary-accent);
            margin-bottom: 16px;
        }

        .login-box h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            border-color: var(--primary-accent);
            background-color: rgba(255, 255, 255, 0.07);
        }

        #login-error {
            color: var(--pengeluaran);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
        }
        /* ========================================= */

        /* --- SIDEBAR DESKTOP --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-surface);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            border-right: 1px solid var(--border-glow);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 48px;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(217, 70, 239, 0.1));
            color: #fff;
            box-shadow: inset 0 0 12px var(--border-glow);
        }

        /* --- KONTEN UTAMA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            padding-bottom: 100px; /* Jarak aman mobile nav */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* --- KARTU SALDO UTAMA --- */
        .balance-card {
            background: linear-gradient(135deg, #2e1065 0%, #1e1b4b 100%);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            position: relative;

            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0
