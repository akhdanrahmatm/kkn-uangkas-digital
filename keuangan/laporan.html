<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* TEMA HIJAU - PUTIH */
            --bg-primary: #f0fdf4; 
            --bg-surface: #ffffff; 
            --primary-accent: #16a34a; 
            --secondary-accent: #22c55e; 
            --text-main: #064e3b; 
            --text-muted: #64748b; 
            --pemasukan: #059669; 
            --pengeluaran: #ef4444; 
            --border-glow: rgba(22, 163, 74, 0.2);
            --glass-bg: rgba(255, 255, 255, 0.85); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, #dcfce7 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #ecfdf5 0%, transparent 40%);
        }

        /* OVERLAY LOGIN */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(240, 253, 244, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(22, 163, 74, 0.15);
            text-align: center;
        }

        .login-box i.fa-leaf {
            font-size: 44px;
            color: var(--primary-accent);
            margin-bottom: 16px;
        }

        .login-box h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--primary-accent);
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            border-color: var(--primary-accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
        }

        #login-error {
            color: var(--pengeluaran);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.3);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* --- SIDEBAR DESKTOP --- */
        .sidebar {
            width: 280px;
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            border-right: 1px solid rgba(22, 163, 74, 0.1);
            flex-shrink: 0;
            box-shadow: 2px 0 15px rgba(0,0,0,0.02);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-accent);
            margin-bottom: 48px;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #f0fdf4;
            color: var(--primary-accent);
        }

        /* --- KONTEN UTAMA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            padding-bottom: 100px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
        }

        /* --- KARTU LAPORAN --- */
        .glass-card {
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            width: 100%; 
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        canvas { width: 100% !important; height: auto !important; }

        /* --- MOBILE BOTTOM NAVBAR --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 72px;
            background-color: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(22, 163, 74, 0.1);
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding: 0 12px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
        }

        .nav-link-mobile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            padding: 8px 12px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            min-height: 50px;
            justify-content: center;
        }

        .nav-link-mobile.active {
            color: var(--primary-accent);
        }

        .nav-link-mobile i {
            font-size: 20px;
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            body { overflow: auto; height: auto; }
            .main-content { padding: 20px 16px; padding-bottom: 120px; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <i class="fa-solid fa-leaf"></i>
            <h2>Selamat Datang</h2>
            <p>Pencatatan uang kas KKN Batang Kabung.</p>
            
            <form id="formLogin">
                <input type="text" id="username" class="login-input" placeholder="Username" required autocomplete="off">
                <input type="password" id="password" class="login-input" placeholder="Password" required>
                <div id="login-error">Username atau password salah!</div>
                <button type="submit" class="btn-submit">Buka Dashboard</button>
            </form>
        </div>
    </div>

    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-wallet"></i>
            <span>KKN Batang Kabung</span>
        </div>
        <ul class="menu-list">
            <li><a href="index.html" class="menu-item"><i class="fa-solid fa-grid-2"></i> Dashboard</a></li>
            <li><a class="menu-item active"><i class="fa-solid fa-chart-pie"></i> Laporan</a></li>
            <li><a class="menu-item" onclick="prosesLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Laporan Keuangan</h1>
                <span id="current-date" style="color: var(--text-muted); font-size: 13px; font-weight: 500;"></span>
            </div>
        </div>

        <div class="glass-card">
            <div class="card-title">
                <i class="fa-solid fa-chart-bar" style="color: var(--primary-accent);"></i>
                <span>Grafik Kontribusi Kas</span>
            </div>
            <canvas id="namaPembayarChart"></canvas>
        </div>
    </div>

    <div class="mobile-nav">
        <a class="nav-link-mobile" href="index.html"><i class="fa-solid fa-grid-2"></i><span>Dashboard</span></a>
        <a class="nav-link-mobile active" href="javascript:void(0)"><i class="fa-solid fa-chart-pie"></i><span>Laporan</span></a>
        <a class="nav-link-mobile" href="javascript:void(0)" onclick="prosesLogout(); return false;"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Keluar</span></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // =========================================
        // LOGIKA LOGIN
        // =========================================
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "12345";
        
        const loginOverlay = document.getElementById('login-overlay');
        const loginForm = document.getElementById('formLogin');
        const loginError = document.getElementById('login-error');

        if (localStorage.getItem("isLoggedIn") === "true") {
            loginOverlay.style.display = "none";
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                localStorage.setItem("isLoggedIn", "true");
                loginOverlay.style.display = "none";
                loginError.style.display = "none";
                loadFinancialReport();
            } else {
                loginError.style.display = "block";
                document.getElementById('password').value = "";
            }
        });

        function prosesLogout() {
            localStorage.removeItem("isLoggedIn");
            location.reload();
        }

        // =========================================
        // TANGGAL HARI INI
        // =========================================
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        // =========================================
        // LOGIKA LAPORAN KEUANGAN
        // =========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyarAddyK0ToIbgSC5-5sJLVbU3dEta9CRvqhmjg2pzXfbO-1jPY_s0BwiKCTlcbbdh/exec";

        async function loadFinancialReport() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // Filter hanya Pemasukan dan jumlahkan per nama
                const summary = {};
                data.transactions.forEach(tx => {
                    if(tx.jenis === "Pemasukan" && tx.nama_pembayar !== "-") {
                        summary[tx.nama_pembayar] = (summary[tx.nama_pembayar] || 0) + Number(tx.jumlah);
                    }
                });

                new Chart(document.getElementById('namaPembayarChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(summary),
                        datasets: [{
                            label: 'Total Setoran (Rp)',
                            data: Object.values(summary),
                            backgroundColor: '#16a34a',
                            borderRadius: 8
                        }]
                    },
                    options: { 
                        responsive: true,
                        plugins: {
                            legend: {
                                display: true,
                                labels: { font: { size: 13 } }
                            }
                        },
                        scales: { 
                            y: { beginAtZero: true } 
                        } 
                    }
                });
            } catch (err) {
                console.error('Gagal memuat laporan:', err);
                document.getElementById('namaPembayarChart').parentElement.innerHTML = 
                    '<div style="text-align:center;color:var(--pengeluaran);padding:30px;">Koneksi ke Google Sheets Gagal.</div>';
            }
        }

        // Pastikan mobile nav links berfungsi di iOS
        document.querySelectorAll('.nav-link-mobile').forEach(link => {
            link.style.webkitTouchCallout = 'none';
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== 'javascript:void(0)') {
                    window.location.href = href;
                }
            });
        });

        // Load laporan saat halaman dimuat
        if (localStorage.getItem("isLoggedIn") === "true") {
            loadFinancialReport();
        }
    </script>
</body>
</html>
